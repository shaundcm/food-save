sonar.projectKey=food-waste-management
sonar.organization=your-org-name

sonar.projectName=Food Waste Management System
sonar.projectVersion=1.0

# Sources
sonar.sources=backend/src,frontend/src
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.ts,**/*.spec.ts,**/prisma/**

# TypeScript
sonar.typescript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info

# Test files
sonar.tests=backend/src,frontend/src
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts,**/*.test.tsx

# Encoding
sonar.sourceEncoding=UTF-8
